#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "snowflake-proxy"
name = "Snowflake"
description.en = "Pluggable Transport using WebRTC"
description.fr = "Pluggable Transport using WebRTC"

version = "2.5.1~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "BSD-3-Clause"
website = "https://snowflake.torproject.org/"
admindoc = "https://community.torproject.org/relay/setup/snowflake/standalone/"
code = "https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/snowflake"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 4444

    [resources.apt]
    packages = "snowflake-proxy"
