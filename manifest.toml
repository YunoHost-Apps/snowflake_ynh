#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "snowflake"
name = "Snowflake"
description.en = "Pluggable Transport using WebRTC"
description.fr = "Proxy utilisant WebRTC"

version = "2.13.1~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "BSD-3-Clause"
website = "https://snowflake.torproject.org/"
admindoc = "https://community.torproject.org/relay/setup/snowflake/standalone/"
code = "https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/snowflake"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = "not_relevant"
sso = "not_relevant"

disk = "600M"
ram.build = "500M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/snowflake/-/archive/v2.13.1/snowflake-v2.13.1.tar.bz2"
    sha256 = "66165f998c0de92470b519a69f31933f791354455dd4586450538136eb2c602e"

    autoupdate.strategy = "latest_gitlab_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]

    [resources.ports]
    main.default = 4444
    main.exposed = "Both"

    [resources.go]
    version = "1.22"
